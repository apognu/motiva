name: Publish to Docker Hub

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true

permissions:
  contents: read
  packages: write

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
      - name: Generate feature combinations
        id: generate
        run: |
          combinations=$(python .github/scripts/featuresets.py)
          echo "matrix=$combinations" >> $GITHUB_OUTPUT

  docker:
    runs-on: ubuntu-latest
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix:
        combination: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    name: docker/features/${{ matrix.combination.features || 'base' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true
          fetch-depth: 0
          fetch-tags: true

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          annotations: |
            org.opencontainers.image.description=Sanctions, PEP and adverse media screening API
          labels: |
            org.opencontainers.image.description=Sanctions, PEP and adverse media screening API

      - name: Authenticate to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          tags: |
            apognu/motiva:${{ inputs.tag }}${{ matrix.combination.suffix }}
            ghcr.io/apognu/motiva:${{ inputs.tag }}${{ matrix.combination.suffix }}
          build-args: |
            "BASE=${{ matrix.combination.base }}"
            ${{ matrix.combination.features != '' && format('CARGO_ARGS=--features {0}', matrix.combination.features) || '' }}
          push: true
          cache-from: type=gha,scope=features${{ matrix.combination.suffix}}
          cache-to: type=gha,mode=max,scope=features${{ matrix.combination.suffix }}
