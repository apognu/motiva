name: Build and test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache build artifacts
        id: build-artifacts
        uses: actions/cache@v4
        with:
          path: |
            .venv/
            target/
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: "check-${{ github.job }}-${{hashFiles('Cargo.lock', 'pyproject.toml')}}"
          restore-keys: |
            check-${{ github.job }}-
            check-

      - name: Check
        run: cargo check --all-features --all-targets

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache build artifacts
        id: build-artifacts
        uses: actions/cache@v4
        with:
          path: |
            .venv/
            target/
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: "lint-${{ github.job }}-${{hashFiles('Cargo.lock', 'pyproject.toml')}}"
          restore-keys: |
            lint-${{ github.job }}-
            lint-
            check-${{ github.job }}-
            check-

      - name: Lint
        run: cargo clippy --all-features -- -D warnings

      - name: Format
        run: cargo fmt --check

  test:
    runs-on: ubuntu-latest
    needs: [check, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache build artifacts
        id: build-artifacts
        uses: actions/cache@v4
        with:
          path: |
            .venv/
            target/
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: "test-${{ github.job }}-${{hashFiles('Cargo.lock', 'pyproject.toml')}}"
          restore-keys: |
            test-${{ github.job }}-
            test-
            check-${{ github.job }}-
            check-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libicu74 libicu-dev

      - name: Install the Python dependencies
        run: uv sync

      - name: Test
        run: cargo llvm-cov --locked --tests --lcov --output-path lcov.info

      - uses: coverallsapp/github-action@v2

  e2e:
    runs-on: ubuntu-latest
    needs: [check, lint]
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
        env:
          discovery.type: single-node
          xpack.security.enabled: false
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      yente-version: 5.2.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache build artifacts
        id: build-artifacts
        uses: actions/cache@v4
        with:
          path: |
            target/
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/pip
          key: "test-${{ github.job }}-${{hashFiles('Cargo.lock', 'pyproject.toml')}}-${{env.yente-version}}"
          restore-keys: |
            e2e-${{ github.job }}-
            e2e-
            check-${{ github.job }}-
            check-

      - name: Yente indexer
        env:
          YENTE_INDEX_URL: http://localhost:9200
          YENTE_MANIFEST: /tmp/manifest.json
        run: |
          echo '{ "catalogs": [{ "resource_name": "entities.ftm.json", "scope": "us_sanctions", "url": "https://data.opensanctions.org/datasets/latest/index.json" }] }' > /tmp/manifest.json
          pip install yente==${{env.yente-version}}
          yente reindex

      - name: E2E tests
        run: cargo test -- --include-ignored e2e
        env:
          INDEX_URL: http://localhost:9200

  build:
    runs-on: ubuntu-latest
    needs: [check, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
          fetch-tags: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache build artifacts
        id: build-artifacts
        uses: actions/cache@v4
        with:
          path: |
            .venv/
            target/
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: "build-${{ github.job }}-${{hashFiles('Cargo.lock', 'pyproject.toml')}}"
          restore-keys: |
            build-${{ github.job }}-
            build-
            check-${{ github.job }}-
            check-

      - name: Build
        run: cargo build --release --all-features

      - name: Print version
        run: cargo run --release --all-features -- version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: motiva
          path: target/release/motiva
          retention-days: 7
